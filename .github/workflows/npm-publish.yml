name: Publish NPM Package

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: publish-main
  cancel-in-progress: false

jobs:
  publish-npm:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
      - run: npm ci
      - run: npm test
      - name: Read latest published npm version
        id: latest-version
        run: |
          package_name=$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).name")
          latest_version=$(npm view "$package_name" version 2>/dev/null || true)
          echo "version=${latest_version}" >> "$GITHUB_OUTPUT"
      - name: Bump patch version
        id: version
        run: |
          base_version="${{ steps.latest-version.outputs.version }}"
          if [ -n "$base_version" ]; then
            echo "version=$(npm run --silent version:bump -- --base-version $base_version)" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(npm run --silent version:bump)" >> "$GITHUB_OUTPUT"
          fi
      - run: npm run build
      - run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Commit version update and tag after publish
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }}"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin HEAD:main --follow-tags
